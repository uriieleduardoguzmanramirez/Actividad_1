<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 17 - Gestión de Tareas</title>

    <link rel="stylesheet" href="css/ejercicio17.css">
</head>
<body>

    <main class="contenedor">
        <section class="panel-tareas">

            <div class="encabezado">
                <span>Ejercicio 17</span>
                <h1>Gestión de Tareas</h1>
                <p>Uso de JSON, Local Storage, funciones, closures y scope.</p>
            </div>

            <div class="formulario-tarea">
                <input type="text" id="tareaInput" placeholder="Escribe una tarea pendiente">
                <button type="button" id="btnAgregar">Agregar tarea</button>
            </div>

            <div class="resumen">
                <p id="contadorTareas">Tareas registradas: 0</p>
            </div>

            <ul id="listaTareas" class="lista-tareas"></ul>

            <p id="mensajeVacio" class="mensaje-vacio">
                No hay tareas registradas por el momento.
            </p>

        </section>
    </main>

    <!-- SweetAlert2 local -->
    <script src="SweetAlert/sweetalert2.all.min.js"></script>

    <!-- JavaScript del ejercicio -->
    <script src="js/ejercicio17.js"></script>
</body>
</html>
