<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 18 - Manipulación del DOM</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS propio -->
    <link rel="stylesheet" href="css/ejercicio18.css">
</head>
<body>

    <main class="container py-5">
        <section class="card shadow-lg border-0 mx-auto panel-principal">
            <div class="card-body p-4 p-md-5">

                <div class="text-center mb-4">
                    <span class="badge rounded-pill bg-primary mb-3">Ejercicio 18</span>
                    <h1 class="fw-bold">Lista Dinámica de Elementos</h1>
                    <p class="text-muted">
                        Aplicación con Bootstrap y manipulación del DOM para agregar y eliminar elementos.
                    </p>
                </div>

                <div class="row g-3 mb-3">
                    <div class="col-12 col-md-8">
                        <input 
                            type="text" 
                            id="nuevoElemento" 
                            class="form-control form-control-lg" 
                            placeholder="Escribe un elemento para agregar"
                        >
                    </div>

                    <div class="col-12 col-md-4">
                        <button id="agregarBtn" class="btn btn-primary btn-lg w-100">
                            Agregar
                        </button>
                    </div>
                </div>

                <div id="mensajeAlerta" class="alert alert-warning d-none" role="alert">
                    Escribe un elemento antes de agregarlo a la lista.
                </div>

                <div class="d-flex justify-content-between align-items-center my-4">
                    <h2 class="h5 m-0">Elementos agregados</h2>
                    <span id="contador" class="badge bg-secondary">Total: 0</span>
                </div>

                <ul id="lista" class="list-group"></ul>

                <p id="mensajeVacio" class="text-center text-muted mt-4">
                    Todavía no hay elementos en la lista.
                </p>

            </div>
        </section>
    </main>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- JS propio -->
    <script src="js/ejercicio18.js"></script>
</body>
</html>
