<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 14 - Operaciones con Arreglos</title>
    <style>
        /* Diseño sencillo y claro */
        body {
            font-family: Arial, sans-serif;
            background-color: #f8f9fa;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .contenedor {
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }
        h2 {
            text-align: center;
            color: #333;
            margin-top: 0;
        }
        .grupo {
            margin-bottom: 15px;
        }
        label {
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
            color: #555;
        }
        input[type="text"] {
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
        }
        input[readonly] {
            background-color: #e9ecef;
            color: #0d6efd;
            font-weight: bold;
            cursor: not-allowed;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #0d6efd;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 15px;
        }
        button:hover {
            background-color: #0b5ed7;
        }
        .error {
            color: red;
            font-size: 13px;
            display: block;
            margin-top: 5px;
            min-height: 15px;
        }
    </style>
</head>
<body>

    <div class="contenedor">
        <h2>Calculadora de Arreglos</h2>
        
        <form onsubmit="return false;">
            <div class="grupo">
                <label for="inputNumeros">Ingresa números separados por comas:</label>
                <input type="text" id="inputNumeros" placeholder="Ej: 10, 20, 30, 40, 50">
                <span id="mensajeError" class="error"></span>
            </div>
            
            <button type="button" id="btnCalcular">Calcular</button>
            
            <div class="grupo">
                <label for="inputMayor">Número mayor:</label>
                <input type="text" id="inputMayor" readonly placeholder="0">
            </div>
            
            <div class="grupo">
                <label for="inputMenor">Número menor:</label>
                <input type="text" id="inputMenor" readonly placeholder="0">
            </div>

            <div class="grupo">
                <label for="inputPromedio">Promedio:</label>
                <input type="text" id="inputPromedio" readonly placeholder="0">
            </div>
        </form>
    </div>

    <script src="js/ejercicio14.js"></script>

</body>
</html>
