<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 10</title>
    <link rel="stylesheet" href="css/ejercicio10.css">

    <style>
        body{
            font-family: system-ui,sans-serif;
            padding: 20px;
            max-width: 600px;
        }
        input{ 
            display: block;
            margin-bottom: 15px;
            padding: 8px;
            width: 100%;
            box-sizing: border-box;
        }
        label{
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
            margin-top: 15px;
        }
        form{
            background-color: #f9f9f9;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 8px;
            margin-bottom: 30px;
        } 
    </style>
</head>

<body>
    <form>
        <label for="nombre_basico">nombre:</label>
        <input type="text" id="nombre_basico" name="nombre_basico">
    </form>
    <input type="text"     id="tipo_texto name="tipo_texto" placeholder="teto libre">
    <input type="password" id="password"  name="password"   placeholder="contraseña">
    <input type="email"    id="email"     name="email"      placeholder="ejemplo@correo.com">
    <input type="number"   id="numero"    name="numero"     placeholder="Ej:42">
    <input type="date"     id="fecha"     name="fecha">
    <input type="time"     id="hora"     name="hora">
    <input type="datetime-local"     id="fecha_hora"     name="fecha_hora">
    <input type="week"               id="semana"     name="semana">
    <input type="month"              id="mes"     name="mes">

    <input type="range"     id="rango"     name="rango">
    <input type="color"     id="color"     name="color">
    <input type="file"      id="archivo"   name="archivo">
    <input type="hidden"    id="oculto"    name="oculto"  value="id_secreto_123">
    <input type="submit     id="enviar"    name="enviar" value="enviar Datos">
    <input type="reset"      id="reset"    name="reset" value="Limpiar todo">
    <input type="button"    id="enviar"    name="enviar" value="boton inutil">

    <input type="text"   id="attr_req"       name="attr_req"      placeholder="obligatorio(required)" required>
    <input type="text"   id="attr_pat"       name="attr_pat"      placeholder="solo letras (pattern)" required pattern="[A-Za-z]+">
    <input type="text"   id="attr_lent"      name="attr_lent"     placeholder="3 a 10 chars (min/maxlength)" required minlength="3" maxlength="10">   
    <input type="number" id="attr_minmax"    name="attr_minmax"   placeholder="Rango 0 a 10(min/max)" required minlength="0" max="10"> 
    <input type="text"   id="attr_readonly"  name="attr_readonly" placeholder="Solo lectura(readonly)" required readonly>
    <input type="text"   id="attr_disabled"  name="attr_disabled" placeholder="Deshabilitado(disabled)" required disabled>
    <input type="text"   id="attr_autofocus" name="attr_autofocus" placeholder="foco inicial(autofocus)" required autofocus>
    <input type="file"   id="attr_mult"      name="attr_mult"      required multiple>

<form action="/submit" method="post" enctype="multipart/form-data novalidate">
    <label for="nombre_final"> formulario final: </label>
    <input type="text" id="nombre_final" name="nombre_final">

    <input type="email" id="email" name="email" placeholder="ejemplo@correo.com" required>

    <input type="submit" value="Enviar post">
</form>

</html>
